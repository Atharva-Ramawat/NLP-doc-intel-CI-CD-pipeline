apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlp-worker
  template:
    metadata:
      labels:
        app: nlp-worker
    spec:
      containers:
      - name: nlp-worker
        image: atharvaramawat/nlp-doc-intel:latest
        command: ["python", "worker.py"] 
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: DB_HOST
          value: "postgres-service"
        - name: MINIO_HOST
          value: "minio-service:9000"